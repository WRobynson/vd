<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d0f17">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>XDownloader - No limit videos. No ads. No popups</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="container">
        <header>
            <div id="language-switcher" class="lang-switcher">
                <div id="current-lang" class="lang-dropdown">
                    <span id="current-lang-flag" class="lang-flag">
                        <img src="https://flagcdn.vercel.app/flags/br.svg" alt="Português" class="flag-img">
                    </span>
                </div>
                <ul class="lang-options">
                    <li class="lang-option active" data-lang="pt">
                        <span class="lang-text">pt BR</span>
                    </li>
                    <li class="lang-option" data-lang="en">
                        <span class="lang-text">en US</span>
                    </li>
                    <li class="lang-option" data-lang="es">
                        <span class="lang-text">es ES</span>
                    </li>
                </ul>
            </div>
            <div class="logo-wrapper">
                <img src="favicon.png" alt="XDownloader Icon" class="main-logo">
                <h1 class="logo">X<span>Downloader</span></h1>
            </div>
            <p class="subtitle" data-t="subtitle">Download videos from Facebook, Instagram, YouTube and more.<br>without adds and popups.</p>
        </header>

        <main>
            <div class="input-card">
                <input type="url" id="video-url" placeholder="Paste video link here..." data-t-placeholder="placeholder" autocomplete="off">
                <button id="fetch-btn">
                    <span id="btn-text" data-t="btn-start">Start</span>
                    <div id="btn-spinner" class="spinner hidden"></div>
                </button>
            </div>

            <div id="error-message" class="error-toast hidden"></div>

            <div id="result-card" class="result-card hidden">
                <div class="thumbnail-wrapper">
                    <img id="vid-thumb" src="" alt="Thumbnail">
                </div>
                <div class="vid-details">
                    <h2 id="vid-title">Video Title</h2>
                    <p id="vid-meta"><span id="vid-duration"></span> • <span id="vid-source"></span></p>
                    <div id="vid-download-options" class="download-options-container">
                        <!-- Buttons injected via JS -->
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p data-t="footer">Created for the XmatriX environment.<br>&copy; 2026 Robynson.COM</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.log('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
